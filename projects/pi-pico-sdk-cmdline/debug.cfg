# debug_blink.cfg - Start OpenOCD GDB server for debugging via Debug Probe
#
# Usage: openocd -f debug.cfg
#
# This starts OpenOCD and leaves it running as a GDB server on port 3333.
# Connect GDB with: arm-none-eabi-gdb build/blink.elf
#                   (gdb) target remote localhost:3333
#
# Stop OpenOCD with Ctrl+C when done.
# Note: VS Code F5 debugging manages OpenOCD automatically and does not
# require this file.

source [find interface/cmsis-dap.cfg]
source [find target/rp2040.cfg]
adapter speed 5000
